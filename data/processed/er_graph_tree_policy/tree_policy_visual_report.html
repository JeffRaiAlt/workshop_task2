<div>                            <div id="3018d08d-daaa-424c-9fe5-4d19499cfca9" class="plotly-graph-div" style="height:545px; width:100%;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("3018d08d-daaa-424c-9fe5-4d19499cfca9")) {                    Plotly.newPlot(                        "3018d08d-daaa-424c-9fe5-4d19499cfca9",                        [{"cells":{"align":"left","values":[["block_family","block_rule","positive_recall","positive_pairs_captured","candidate_pairs","pairs_per_positive_captured","max_block_size","profile_coverage","context","coverage_compound","behavior","behavior_context","behavior_context_device","identity_rescue","coverage_fallback"],["\u0421\u0435\u043c\u0435\u0439\u0441\u0442\u0432\u043e \u043f\u0440\u0430\u0432\u0438\u043b\u0430. \u041f\u043e\u043a\u0430\u0437\u044b\u0432\u0430\u0435\u0442 \u043e\u0431\u0449\u0438\u0439 \u0442\u0438\u043f \u0441\u0438\u0433\u043d\u0430\u043b\u0430: \u0433\u0435\u043e\u002fcontext, \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435, \u043a\u043e\u043c\u043f\u043e\u0437\u0438\u0442\u043d\u044b\u0439 \u0441\u0438\u0433\u043d\u0430\u043b \u0438\u043b\u0438 identity-rescue.","\u041a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u043e\u0435 \u043f\u0440\u0430\u0432\u0438\u043b\u043e, \u043f\u043e \u043a\u043e\u0442\u043e\u0440\u043e\u043c\u0443 \u0441\u0442\u0440\u043e\u0438\u0442\u0441\u044f \u0431\u043b\u043e\u043a. \u041d\u0430\u043f\u0440\u0438\u043c\u0435\u0440: \u0433\u0435\u043e + \u0443\u0441\u0442\u0440\u043e\u0439\u0441\u0442\u0432\u043e + \u041e\u0421 \u0438\u043b\u0438 \u0442\u043e\u0447\u043d\u043e\u0435 \u0441\u043e\u0432\u043f\u0430\u0434\u0435\u043d\u0438\u0435 \u0442\u0435\u043b\u0435\u0444\u043e\u043d\u0430.","\u0414\u043e\u043b\u044f \u043d\u0430\u0441\u0442\u043e\u044f\u0449\u0438\u0445 \u043f\u0430\u0440-\u0434\u0443\u0431\u043b\u0435\u0439, \u043a\u043e\u0442\u043e\u0440\u044b\u0435 \u044d\u0442
