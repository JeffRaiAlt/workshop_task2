version: '3.8'

services:
  profile-matching-app:
    build: .
    container_name: profile-matching
    ports:
      - "8502:8501"
    volumes:
      - ./artifacts:/app/artifacts  # монтируем артефакты
      - ./logs:/app/logs             # монтируем логи (если есть)
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=200
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - TZ=Europe/Moscow
    restart: unless-stopped
    mem_limit: 4g
    cpus: '2'